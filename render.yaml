services:
  - type: web
    name: nova-ai
    runtime: node
    buildCommand: bun install && bun run build
    startCommand: bun start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://nova-ai.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: noreply.novaai@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: Nova AI <noreply.novaai@gmail.com>
